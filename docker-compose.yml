services:
  postgres:
    image: postgres:16-alpine
    container_name: pd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa_palestine_drinks
    ports:
      - "5433:5432"
    volumes:
      - pd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa_palestine_drinks"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pd-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - pd_redis_data:/data

volumes:
  pd_pg_data:
  pd_redis_data:
